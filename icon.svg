<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Fond blanc cassé — lisible en mode clair ET sombre -->
  <rect width="180" height="180" rx="40" fill="#f5f0e8"/>
  
  <!-- Cercle décoratif doré en arrière-plan -->
  <circle cx="90" cy="72" r="44" fill="#c8a96e22"/>
  
  <!-- Symbole € doré -->
  <text x="90" y="88" font-family="Georgia,serif" font-size="62" font-weight="bold" fill="#c8a96e" text-anchor="middle">€</text>
  
  <!-- Barre fine séparatrice -->
  <line x1="28" y1="112" x2="152" y2="112" stroke="#c8a96e44" stroke-width="1.5"/>
  
  <!-- Mini courbe verte -->
  <polyline points="28,150 55,140 82,145 110,130 137,122 152,126" 
    stroke="#5ec994" stroke-width="3.5" fill="none" 
    stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Points sur la courbe -->
  <circle cx="28"  cy="150" r="4.5" fill="#5ec994"/>
  <circle cx="55"  cy="140" r="4.5" fill="#5ec994"/>
  <circle cx="82"  cy="145" r="4.5" fill="#5ec994"/>
  <circle cx="110" cy="130" r="4.5" fill="#5ec994"/>
  <circle cx="137" cy="122" r="4.5" fill="#5ec994"/>
  <circle cx="152" cy="126" r="4.5" fill="#5ec994"/>
</svg>
